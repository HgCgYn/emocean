<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EMOCEAN - 情緒海洋</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <script src="https://d3js.org/d3.v5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.5/d3.layout.cloud.min.js"></script>
</head>
<body>

  <div id="appContainer">
    
    <div id="startScreen">
      <h1>EMOCEAN</h1>
      <p>- CLICK ANYWHERE TO START -</p>
    </div>

    <div id="skyOverlay"></div>
    <canvas id="oceanCanvas"></canvas>

    <div id="dimOverlay" class="hidden"></div>

    <div id="controlWrapper">
      <!-- 🌟 設定按鈕與面板融合區 -->
      <div class="morph-group" id="settingGroup">
        <button id="settingBtn" class="icon-btn morph-btn" title="設定">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="#ffffff">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
          </svg>
        </button>
        <div id="settingsPanel" class="panel morph-panel hidden">
          <div class="panel-header">SETTING</div>
          <button id="themeToggleBtn" class="action-btn">亮色模式</button>
          <a href="https://linktr.ee/Cheng_Yin_Huang" target="_blank" class="action-btn link-btn">開發者資訊</a>
        </div>
      </div>

      <!-- 🌟 情緒輸入按鈕與面板融合區 -->
      <div class="morph-group" id="inputGroup">
        <button id="toggleBtn" class="icon-btn morph-btn" title="撰寫心事">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="#ffffff">
            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
          </svg>
        </button>
        <div id="inputContent" class="panel morph-panel hidden">
          <div id="step1">
            <div class="panel-header">你現在的心情是？</div>
            <div id="emotionSelector"></div>
          </div>
          <div id="step2" class="hidden">
            <div class="panel-header">寫下你想說的話...</div>
            <input type="text" id="messageInput" placeholder="請輸入..." autocomplete="off" maxlength="50" />
            <div class="btn-group">
              <button id="backBtn" class="action-btn">上一步</button>
              <button id="submitBtn" class="action-btn">完成</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="musicControlWrapper" class="hidden">
      <!-- 🌟 燈光秀音樂按鈕與膠囊融合區 -->
      <div class="morph-group morph-music" id="musicGroup">
        <button id="waveSoundBtn" class="icon-btn morph-btn" title="音樂燈光秀">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="#ffffff">
            <rect x="11" y="5" width="2" height="14" rx="1" />
            <rect x="7" y="9" width="2" height="6" rx="1" />
            <rect x="15" y="8" width="2" height="8" rx="1" />
            <rect x="3" y="11" width="2" height="2" rx="1" />
            <rect x="19" y="10" width="2" height="4" rx="1" />
          </svg>
        </button>
        <div id="musicCapsule" class="panel morph-panel hidden">
          <button class="music-mode-btn" data-song="Lounge Music">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="22 3 2 3 12 14 22 3"/>
              <line x1="12" y1="14" x2="12" y2="21"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="15" y1="3" x2="10" y2="9"/>
            </svg>
          </button>
          <button class="music-mode-btn" data-song="Deep House">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/>
              <circle cx="12" cy="14" r="4.5"/>
              <circle cx="12" cy="6" r="1.5"/>
            </svg>
          </button>
          <button class="music-mode-btn" data-song="Jazz House">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="3"/>
              <path d="M13 15V9c0-.6.4-1 1-1h2"/>
              <circle cx="11.5" cy="15.5" r="1.5"/>
            </svg>
          </button>
          <button class="music-mode-btn" data-song="Violin Concerto">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 9c0-1.5 1-2.5 1-4 0-1.66-1.34-3-3-3S9 3.34 9 5c0 1.5 1 2.5 1 4 0 1-.5 1.5-1 2-1.5 1.5-3 2.5-3 4.5 0 2.21 1.79 4 4 4h4c2.21 0 4-1.79 4-4 0-2-1.5-3-3-4.5-.5-.5-1-1-1-2z"/>
              <line x1="12" y1="15" x2="12" y2="2"/>
              <line x1="4" y1="22" x2="22" y2="4"/>
            </svg>
          </button>
          <button class="music-mode-btn" data-song="Phonk">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
            </svg>
          </button>
          <button class="music-mode-btn" data-song="Piano Solo">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="5" width="20" height="14" rx="2"/>
              <line x1="6" y1="5" x2="6" y2="19"/>
              <line x1="10" y1="5" x2="10" y2="19"/>
              <line x1="14" y1="5" x2="14" y2="19"/>
              <line x1="18" y1="5" x2="18" y2="19"/>
              <line x1="6" y1="5" x2="6" y2="12" stroke-width="3"/>
              <line x1="10" y1="5" x2="10" y2="12" stroke-width="3"/>
              <line x1="18" y1="5" x2="18" y2="12" stroke-width="3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div id="mobileBottomBar" class="hidden">
      <button id="viewMsgBtn" class="pill-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="#ffffff" style="vertical-align: middle; margin-right: 6px; margin-bottom: 3px;">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        查看留言
      </button>
      <button id="writeMsgBtn" class="pill-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="#ffffff" style="vertical-align: middle; margin-right: 6px; margin-bottom: 3px;">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
        </svg>
        撰寫留言
      </button>
    </div>

    <div id="dpadPanel" class="hidden">
      <div id="dpadContainer">
        <button id="dpadUp" class="dpad-btn">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </button>
        <button id="dpadLeft" class="dpad-btn">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="dpad-spacer"></div>
        <button id="dpadRight" class="dpad-btn">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        <button id="dpadDown" class="dpad-btn">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
      </div>
    </div>

    <div id="tooltip" class="tooltip-card">
      <span id="tooltipContent"></span>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
